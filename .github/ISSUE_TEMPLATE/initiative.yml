name: Initiative
description: Strategic objective spanning multiple epics and repos
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Business goal and strategic context for this initiative"
      placeholder: "What outcome does this initiative achieve and why does it matter?"
    validations:
      required: true

  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: "Measurable outcomes that define completion"
      placeholder: |
        - [ ] Metric or outcome 1
        - [ ] Metric or outcome 2
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: "Explicitly excluded from this initiative"
      placeholder: |
        - Item 1
        - Item 2
    validations:
      required: false

  - type: textarea
    id: risks-dependencies
    attributes:
      label: Risks & Dependencies
      description: "Anything that could block delivery or requires caution"
    validations:
      required: false
