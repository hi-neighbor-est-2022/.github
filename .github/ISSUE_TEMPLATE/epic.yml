name: Epic
description: Large feature or workstream supporting an initiative
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What this epic delivers and why it matters"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: "Outcomes that define this epic as complete"
      placeholder: |
        - [ ] Outcome 1
        - [ ] Outcome 2
    validations:
      required: true
