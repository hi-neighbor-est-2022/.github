name: Subtask
description: Granular implementation detail under a task
labels: ["subtask"]
body:
  - type: input
    id: parent-task
    attributes:
      label: Parent Task
      description: "Link to the parent task issue"
      placeholder: "hi-neighbor-est-2022/repo-name#issue-number"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What this subtask accomplishes"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: "Specific testable outcomes"
      placeholder: |
        - [ ] Outcome 1
        - [ ] Outcome 2
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation Notes
      description: "Summary of what was done — fill after implementation"
    validations:
      required: false
